name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore backend/tests/CdbCalculator.UnitTests

      - name: Build
        run: dotnet build backend/tests/CdbCalculator.UnitTests --no-restore

      - name: Run tests
        run: dotnet test backend/tests/CdbCalculator.UnitTests --no-build

  frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/cdbcalculator/package-lock.json

      - name: Install dependencies
        working-directory: frontend/cdbcalculator
        run: npm ci

      - name: Lint
        working-directory: frontend/cdbcalculator
        run: npm run lint

      - name: Run tests
        working-directory: frontend/cdbcalculator
        run: npm test -- --watch=false --browsers=ChromeHeadless
